<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Journal | Professional Forex & Crypto Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-600: #5E6AD2;
            --brand-700: #4A56C0;
            --bg-canvas: #F8FAFC;
            --bg-surface: #FFFFFF;
            --border-default: #E2E8F0;
            --text-primary: #0F172A;
            --text-muted: #475569;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            margin: 0;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom scrollbar for a clean look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.400.0?external=react,react-dom",
        "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
        "framer-motion": "https://esm.sh/framer-motion@11?external=react,react-dom",
        "clsx": "https://esm.sh/clsx@2.1.1",
        "tailwind-merge": "https://esm.sh/tailwind-merge@2.3.0"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            LayoutDashboard, 
            PlusCircle, 
            History, 
            Settings, 
            TrendingUp, 
            TrendingDown, 
            DollarSign, 
            Activity,
            ArrowUpRight,
            ArrowDownRight,
            ChevronRight,
            Search,
            MoreHorizontal,
            Filter,
            Plus,
            X,
            Trash2,
            Smile,
            Meh,
            Frown,
            Zap,
            Cpu
        } from 'lucide-react';
        import { 
            LineChart, 
            Line, 
            XAxis, 
            YAxis, 
            CartesianGrid, 
            Tooltip, 
            ResponsiveContainer,
            AreaChart,
            Area
        } from 'recharts';
        import { motion, AnimatePresence } from 'framer-motion';
        import { clsx } from 'clsx';
        import { twMerge } from 'tailwind-merge';

        function cn(...inputs) {
            return twMerge(clsx(inputs));
        }

        // --- Components ---

        const Button = ({ className, variant = 'primary', size = 'md', children, ...props }) => {
            const variants = {
                primary: 'bg-[#5E6AD2] text-white hover:bg-[#4A56C0] shadow-sm',
                secondary: 'bg-white text-slate-900 border border-slate-200 hover:bg-slate-50 shadow-xs',
                ghost: 'bg-transparent text-slate-600 hover:bg-slate-100 hover:text-slate-900',
                danger: 'bg-rose-600 text-white hover:bg-rose-700 shadow-sm'
            };
            const sizes = {
                sm: 'h-8 px-3 text-xs',
                md: 'h-9 px-4 text-sm',
                lg: 'h-11 px-6 text-base'
            };
            return (
                <button 
                    className={cn(
                        'inline-flex items-center justify-center gap-2 rounded-md font-medium transition-all active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none',
                        variants[variant],
                        sizes[size],
                        className
                    )}
                    {...props}
                >
                    {children}
                </button>
            );
        };

        const Card = ({ children, className }) => (
            <div className={cn('bg-white border border-slate-200 rounded-xl overflow-hidden', className)}>
                {children}
            </div>
        );

        const MetricCard = ({ title, value, subValue, trend, icon: Icon }) => (
            <Card className="p-5 flex flex-col gap-1">
                <div className="flex justify-between items-start">
                    <span className="text-xs font-medium text-slate-500 uppercase tracking-wider">{title}</span>
                    <Icon className="w-4 h-4 text-slate-400" />
                </div>
                <div className="flex items-baseline gap-2 mt-1">
                    <span className="text-2xl font-semibold tracking-tight tabular-nums">{value}</span>
                    {trend && (
                        <span className={cn('text-[11px] font-medium px-1.5 py-0.5 rounded-full', 
                            trend > 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'
                        )}>
                            {trend > 0 ? '+' : ''}{trend}%
                        </span>
                    )}
                </div>
                <span className="text-xs text-slate-400 font-medium">{subValue}</span>
            </Card>
        );

        const FeelingIcon = ({ feeling, className }) => {
            switch (feeling) {
                case 'Calm': return <Smile className={cn("w-4 h-4 text-emerald-500", className)} />;
                case 'FOMO': return <Zap className={cn("w-4 h-4 text-amber-500", className)} />;
                case 'Greedy': return <DollarSign className={cn("w-4 h-4 text-brand-600", className)} />;
                case 'Anxious': return <Activity className={cn("w-4 h-4 text-rose-500", className)} />;
                case 'Revenge': return <Frown className={cn("w-4 h-4 text-red-700", className)} />;
                default: return <Meh className={cn("w-4 h-4 text-slate-400", className)} />;
            }
        };

        // --- Main App ---

        const App = () => {
            const [trades, setTrades] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');

            const fetchTrades = async () => {
                try {
                    const res = await fetch('./api/trades' + window.location.search);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    setTrades(data);
                } catch (err) {
                    console.error('Failed to fetch trades', err);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchTrades();
            }, []);

            const stats = useMemo(() => {
                if (trades.length === 0) return { winRate: 0, profitFactor: 0, avgRR: 0, totalPnL: 0 };
                
                const winners = trades.filter(t => t.pnl > 0);
                const losers = trades.filter(t => t.pnl < 0);
                
                const winRate = ((winners.length / trades.length) * 100).toFixed(1);
                
                const grossProfit = winners.reduce((sum, t) => sum + t.pnl, 0);
                const grossLoss = Math.abs(losers.reduce((sum, t) => sum + t.pnl, 0));
                const profitFactor = grossLoss === 0 ? grossProfit : (grossProfit / grossLoss).toFixed(2);
                
                const avgRR = (trades.reduce((sum, t) => sum + parseFloat(t.rr || 0), 0) / trades.length).toFixed(2);
                const totalPnL = trades.reduce((sum, t) => sum + t.pnl, 0).toFixed(2);

                return { winRate, profitFactor, avgRR, totalPnL };
            }, [trades]);

            const chartData = useMemo(() => {
                let cumulative = 0;
                return trades.slice().reverse().map((t, i) => {
                    cumulative += t.pnl;
                    return {
                        name: i + 1,
                        pnl: parseFloat(cumulative.toFixed(2))
                    };
                });
            }, [trades]);

            const handleDelete = async (id) => {
                if (!confirm('Delete this trade?')) return;
                await fetch(`./api/trades/${id}` + window.location.search, { method: 'DELETE' });
                fetchTrades();
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 border-r border-slate-200 bg-white flex flex-col shrink-0">
                        <div className="p-6 flex items-center gap-3">
                            <div className="w-8 h-8 rounded-lg bg-[#5E6AD2] flex items-center justify-center text-white shadow-lg">
                                <TrendingUp className="w-5 h-5" strokeWidth={2.5} />
                            </div>
                            <span className="font-bold text-lg tracking-tight">TradeLog</span>
                        </div>

                        <nav className="flex-1 px-3 space-y-1">
                            <SidebarItem 
                                icon={LayoutDashboard} 
                                label="Dashboard" 
                                active={activeTab === 'dashboard'} 
                                onClick={() => setActiveTab('dashboard')} 
                            />
                            <SidebarItem 
                                icon={History} 
                                label="History" 
                                active={activeTab === 'history'} 
                                onClick={() => setActiveTab('history')} 
                            />
                            <SidebarItem icon={TrendingUp} label="Analytics" disabled />
                            <SidebarItem icon={Settings} label="Settings" disabled />
                        </nav>

                        <div className="p-4 border-t border-slate-100">
                            <div className="flex items-center gap-3 p-2 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer">
                                <div className="w-8 h-8 rounded-full bg-slate-200"></div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-sm font-medium truncate">Trader Pro</p>
                                    <p className="text-xs text-slate-500 truncate">demo@tradelog.com</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto bg-slate-50/50 relative">
                        <header className="sticky top-0 z-10 glass border-b border-slate-200/60 px-8 py-4 flex justify-between items-center">
                            <h1 className="text-lg font-semibold text-slate-900">
                                {activeTab === 'dashboard' ? 'Market Overview' : 'Trade History'}
                            </h1>
                            <div className="flex items-center gap-3">
                                <Button size="sm" variant="secondary">
                                    <Search className="w-4 h-4 text-slate-400" />
                                    <span className="sr-only">Search</span>
                                </Button>
                                <Button onClick={() => setIsAdding(true)}>
                                    <Plus className="w-4 h-4" />
                                    New Trade
                                </Button>
                            </div>
                        </header>

                        <div className="max-w-7xl mx-auto px-8 py-8 space-y-8">
                            {activeTab === 'dashboard' ? (
                                <>
                                    {/* Stats Grid */}
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <MetricCard 
                                            title="Win Rate" 
                                            value={`${stats.winRate}%`} 
                                            subValue="Target: 60%+" 
                                            icon={Zap} 
                                        />
                                        <MetricCard 
                                            title="Profit Factor" 
                                            value={stats.profitFactor} 
                                            subValue="Target: 1.5+" 
                                            icon={Activity} 
                                        />
                                        <MetricCard 
                                            title="Avg R/R" 
                                            value={stats.avgRR} 
                                            subValue="Risk Adjusted" 
                                            icon={TrendingUp} 
                                        />
                                        <MetricCard 
                                            title="Total PnL" 
                                            value={`$${stats.totalPnL}`} 
                                            subValue="Account Balance" 
                                            icon={DollarSign} 
                                            trend={stats.totalPnL > 0 ? 12.4 : -3.2}
                                        />
                                    </div>

                                    {/* Chart & Recent */}
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <Card className="lg:col-span-2 p-6 flex flex-col gap-6">
                                            <div className="flex justify-between items-center">
                                                <h3 className="font-semibold text-slate-900">Performance Equity</h3>
                                                <div className="flex gap-2">
                                                    <span className="text-xs font-medium text-slate-500 bg-slate-100 px-2 py-1 rounded">Last 30 Days</span>
                                                </div>
                                            </div>
                                            <div className="h-72 w-full">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <AreaChart data={chartData}>
                                                        <defs>
                                                            <linearGradient id="colorPnL" x1="0" y1="0" x2="0" y2="1">
                                                                <stop offset="5%" stopColor="#5E6AD2" stopOpacity={0.1}/>
                                                                <stop offset="95%" stopColor="#5E6AD2" stopOpacity={0}/>
                                                            </linearGradient>
                                                        </defs>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                        <XAxis 
                                                            dataKey="name" 
                                                            axisLine={false} 
                                                            tickLine={false} 
                                                            tick={{fontSize: 10, fill: '#94a3b8'}} 
                                                            dy={10}
                                                        />
                                                        <YAxis 
                                                            axisLine={false} 
                                                            tickLine={false} 
                                                            tick={{fontSize: 10, fill: '#94a3b8'}} 
                                                            tickFormatter={(v) => `$${v}`}
                                                        />
                                                        <Tooltip 
                                                            contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)' }}
                                                            formatter={(value) => [`$${value}`, 'Equity']}
                                                        />
                                                        <Area 
                                                            type="monotone" 
                                                            dataKey="pnl" 
                                                            stroke="#5E6AD2" 
                                                            strokeWidth={2}
                                                            fillOpacity={1} 
                                                            fill="url(#colorPnL)" 
                                                        />
                                                    </AreaChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </Card>

                                        <Card className="p-6 flex flex-col gap-6">
                                            <h3 className="font-semibold text-slate-900">Recent Psychology</h3>
                                            <div className="space-y-4">
                                                {trades.slice(0, 5).map(trade => (
                                                    <div key={trade.id} className="flex items-center gap-3">
                                                        <div className={cn("p-2 rounded-lg bg-slate-50")}>
                                                            <FeelingIcon feeling={trade.feeling} />
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <p className="text-sm font-medium text-slate-700">{trade.pair}</p>
                                                            <p className="text-xs text-slate-400">{trade.feeling} during execution</p>
                                                        </div>
                                                        <span className={cn("text-xs font-mono", trade.pnl >= 0 ? "text-emerald-600" : "text-rose-600")}>
                                                            {trade.pnl >= 0 ? '+' : ''}{trade.pnl}
                                                        </span>
                                                    </div>
                                                ))}
                                                {trades.length === 0 && (
                                                    <div className="text-center py-8">
                                                        <p className="text-xs text-slate-400">No recent trades</p>
                                                    </div>
                                                )}
                                            </div>
                                            <Button variant="secondary" size="sm" className="w-full mt-2" onClick={() => setActiveTab('history')}>
                                                View All History
                                            </Button>
                                        </Card>
                                    </div>
                                </>
                            ) : (
                                <Card className="overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b border-slate-200">
                                                    <th className="px-6 py-3 text-xs font-semibold text-slate-500 uppercase">Pair / Date</th>
                                                    <th className="px-6 py-3 text-xs font-semibold text-slate-500 uppercase">Type</th>
                                                    <th className="px-6 py-3 text-xs font-semibold text-slate-500 uppercase text-right">Entry</th>
                                                    <th className="px-6 py-3 text-xs font-semibold text-slate-500 uppercase text-right">Exit</th>
                                                    <th className="px-6 py-3 text-xs font-semibold text-slate-500 uppercase text-right">PnL</th>
                                                    <th className="px-6 py-3 text-xs font-semibold text-slate-500 uppercase text-center">R/R</th>
                                                    <th className="px-6 py-3 text-xs font-semibold text-slate-500 uppercase text-center">Feeling</th>
                                                    <th className="px-6 py-3 text-xs font-semibold text-slate-500 uppercase"></th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {trades.map(trade => (
                                                    <tr key={trade.id} className="border-b border-slate-100 hover:bg-slate-50/50 transition-colors group">
                                                        <td className="px-6 py-4">
                                                            <div className="flex flex-col">
                                                                <span className="text-sm font-semibold text-slate-900">{trade.pair}</span>
                                                                <span className="text-xs text-slate-400">{new Date(trade.timestamp).toLocaleDateString()}</span>
                                                            </div>
                                                        </td>
                                                        <td className="px-6 py-4">
                                                            <span className={cn("inline-flex items-center gap-1 text-[11px] font-bold px-2 py-0.5 rounded-full", 
                                                                trade.type === 'Long' ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'
                                                            )}>
                                                                {trade.type === 'Long' ? <ArrowUpRight className="w-3 h-3" /> : <ArrowDownRight className="w-3 h-3" />}
                                                                {trade.type.toUpperCase()}
                                                            </span>
                                                        </td>
                                                        <td className="px-6 py-4 text-right text-sm font-mono text-slate-600">{trade.entry}</td>
                                                        <td className="px-6 py-4 text-right text-sm font-mono text-slate-600">{trade.exit || '-'}</td>
                                                        <td className={cn("px-6 py-4 text-right text-sm font-bold tabular-nums", trade.pnl >= 0 ? "text-emerald-600" : "text-rose-600")}>
                                                            {trade.pnl >= 0 ? '+' : ''}{trade.pnl.toFixed(2)}
                                                        </td>
                                                        <td className="px-6 py-4 text-center">
                                                            <span className="text-xs font-medium text-slate-500 bg-slate-100 px-2 py-1 rounded">{trade.rr}R</span>
                                                        </td>
                                                        <td className="px-6 py-4 text-center">
                                                            <div className="flex justify-center">
                                                                <FeelingIcon feeling={trade.feeling} />
                                                            </div>
                                                        </td>
                                                        <td className="px-6 py-4 text-right">
                                                            <button 
                                                                onClick={() => handleDelete(trade.id)}
                                                                className="p-2 text-slate-300 hover:text-rose-600 opacity-0 group-hover:opacity-100 transition-all"
                                                            >
                                                                <Trash2 className="w-4 h-4" />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {trades.length === 0 && (
                                                    <tr>
                                                        <td colSpan="8" className="px-6 py-12 text-center text-slate-400 text-sm">
                                                            No trades logged yet. Start by adding your first trade.
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </Card>
                            )}
                        </div>
                    </main>

                    {/* Add Trade Modal */}
                    <AnimatePresence>
                        {isAdding && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                                <motion.div 
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    exit={{ opacity: 0 }}
                                    onClick={() => setIsAdding(false)}
                                    className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"
                                />
                                <motion.div 
                                    initial={{ opacity: 0, scale: 0.95, y: 20 }}
                                    animate={{ opacity: 1, scale: 1, y: 0 }}
                                    exit={{ opacity: 0, scale: 0.95, y: 20 }}
                                    className="relative w-full max-w-xl bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col"
                                >
                                    <div className="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                        <h2 className="text-xl font-bold text-slate-900">Log New Trade</h2>
                                        <button onClick={() => setIsAdding(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                                            <X className="w-5 h-5 text-slate-400" />
                                        </button>
                                    </div>

                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        const formData = new FormData(e.target);
                                        const data = Object.fromEntries(formData.entries());
                                        
                                        await fetch('./api/trades' + window.location.search, {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify(data)
                                        });
                                        
                                        setIsAdding(false);
                                        fetchTrades();
                                    }} className="flex-1 overflow-y-auto p-8 space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1.5">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Market</label>
                                                <select name="market" className="w-full h-11 px-4 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#5E6AD2]/20 transition-all">
                                                    <option>Forex</option>
                                                    <option>Crypto</option>
                                                </select>
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Asset Pair</label>
                                                <input name="pair" required placeholder="e.g. EURUSD or BTCUSDT" className="w-full h-11 px-4 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#5E6AD2]/20 transition-all" />
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1.5">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Type</label>
                                                <div className="grid grid-cols-2 gap-2">
                                                    <label className="relative cursor-pointer">
                                                        <input type="radio" name="type" value="Long" defaultChecked className="peer sr-only" />
                                                        <div className="h-11 flex items-center justify-center rounded-xl border border-slate-200 bg-slate-50 text-sm font-medium text-slate-600 peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700 transition-all">
                                                            Long
                                                        </div>
                                                    </label>
                                                    <label className="relative cursor-pointer">
                                                        <input type="radio" name="type" value="Short" className="peer sr-only" />
                                                        <div className="h-11 flex items-center justify-center rounded-xl border border-slate-200 bg-slate-50 text-sm font-medium text-slate-600 peer-checked:bg-amber-50 peer-checked:border-amber-500 peer-checked:text-amber-700 transition-all">
                                                            Short
                                                        </div>
                                                    </label>
                                                </div>
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Position Size</label>
                                                <input name="amount" type="number" step="0.0001" defaultValue="1" className="w-full h-11 px-4 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#5E6AD2]/20 transition-all" />
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-3 gap-4">
                                            <div className="space-y-1.5">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Entry</label>
                                                <input name="entry" type="number" step="0.00001" required className="w-full h-11 px-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-mono focus:outline-none focus:ring-2 focus:ring-[#5E6AD2]/20 transition-all" />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Exit</label>
                                                <input name="exit" type="number" step="0.00001" className="w-full h-11 px-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-mono focus:outline-none focus:ring-2 focus:ring-[#5E6AD2]/20 transition-all" />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Stop Loss</label>
                                                <input name="stop_loss" type="number" step="0.00001" required className="w-full h-11 px-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-mono focus:outline-none focus:ring-2 focus:ring-[#5E6AD2]/20 transition-all" />
                                            </div>
                                        </div>

                                        <div className="space-y-1.5">
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">How did you feel?</label>
                                            <div className="grid grid-cols-5 gap-2">
                                                {['Calm', 'FOMO', 'Greedy', 'Anxious', 'Revenge'].map(f => (
                                                    <label key={f} className="relative cursor-pointer group">
                                                        <input type="radio" name="feeling" value={f} className="peer sr-only" defaultChecked={f === 'Calm'} />
                                                        <div className="flex flex-col items-center gap-1 p-3 rounded-xl border border-slate-100 bg-slate-50/50 hover:bg-slate-50 peer-checked:bg-white peer-checked:border-[#5E6AD2] peer-checked:shadow-md transition-all">
                                                            <FeelingIcon feeling={f} className="w-5 h-5" />
                                                            <span className="text-[10px] font-bold text-slate-400 peer-checked:text-[#5E6AD2]">{f}</span>
                                                        </div>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="space-y-1.5">
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Notes</label>
                                            <textarea name="notes" rows="3" placeholder="Setup details, lessons learned..." className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#5E6AD2]/20 transition-all resize-none"></textarea>
                                        </div>

                                        <div className="pt-4 flex gap-3">
                                            <Button type="button" variant="secondary" className="flex-1" onClick={() => setIsAdding(false)}>Cancel</Button>
                                            <Button type="submit" className="flex-[2]">Save Trade Log</Button>
                                        </div>
                                    </form>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const SidebarItem = ({ icon: Icon, label, active, onClick, disabled }) => (
            <button 
                onClick={onClick}
                disabled={disabled}
                className={cn(
                    'w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all',
                    active 
                        ? 'bg-slate-100 text-[#5E6AD2]' 
                        : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900',
                    disabled && 'opacity-30 cursor-not-allowed'
                )}
            >
                <Icon className={cn("w-4 h-4", active ? "text-[#5E6AD2]" : "text-slate-400")} />
                {label}
            </button>
        );

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
